name: Build and Publish Extension [Container and Helm Chart - Multi-Arch]

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'charts/suse-ai-operator/**'
      - 'suse-ai-operator/**'
      - '.github/workflows/release-operator.yml'
    tags:
      - suse-ai-lifecycle-manager-*

env:
  CHART_PATH: charts/suse-ai-lifecycle-manager
  CHART_REGISTRY: oci://ghcr.io/leooamaral/chart
  IMAGE_NAME: ghcr.io/leooamaral/suse-ai-lifecycle-manager
jobs:
  prepare:
    outputs:
      VERSION: ${{ steps.tags.outputs.VERSION }}
      CHART_VERSION: ${{ steps.tags.outputs.CHART_VERSION }}
      PUBLISH: ${{ steps.tags.outputs.PUBLISH }}
      METADATA_TAGS: ${{ steps.tags.outputs.METADATA_TAGS }}
      NOTES_START_TAG: ${{ steps.tags.outputs.NOTES_START_TAG }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Calculate tags
        id: tags 
        shell: bash
        run: |
          ref=${{ github.ref }}
          case "$ref" in
            refs/heads/main)
              BASE_VERSION=$(jq -r '.version' pkg/suse-ai-lifecycle-manager/package.json)
              
              git fetch --tags

              LAST_DEV=$(git tag \
                --list "suse-ai-lifecycle-manager-${BASE_VERSION}-dev.*" \
                --sort=-v:refname \
                | head -n 1)

              if [[ -z "$LAST_DEV" ]]; then
                DEV_NUM=1
                NOTES_START_TAG=$(git tag --list "suse-ai-lifecycle-manager-*" --sort=-v:refname | grep -v "\-dev" | head -n 1)
              else
                DEV_NUM="${LAST_DEV##*.}"
                DEV_NUM=$((DEV_NUM + 1))
                NOTES_START_TAG="$LAST_DEV"
              fi

              VERSION="${BASE_VERSION}-dev.${DEV_NUM}"
              CHART_VERSION="$VERSION"
              PUBLISH=true

              METADATA_TAGS="$VERSION"
              ;;
            refs/tags/suse-ai-lifecycle-manager-*)
              VERSION="${ref#refs/tags/suse-ai-lifecycle-manager-}"
              CHART_VERSION="$VERSION"
              NOTES_START_TAG=""
              PUBLISH=true

              if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                METADATA_TAGS="$VERSION"$'\n'"latest"
              else
                METADATA_TAGS="$VERSION"
              fi
              ;;
            *)
              VERSION="${{ github.sha }}"
              CHART_VERSION="$VERSION"
              NOTES_START_TAG=""
              PUBLISH=false

              METADATA_TAGS="$VERSION"
              ;;
          esac

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PUBLISH=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "CHART_VERSION=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "NOTES_START_TAG=$NOTES_START_TAG" >> "$GITHUB_OUTPUT"
          
          echo "METADATA_TAGS<<EOF" >> $GITHUB_OUTPUT
          echo "$METADATA_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Build Container Image
    needs: prepare
    if: needs.prepare.outputs.PUBLISH == 'true'
    permissions:
      contents: read
      packages: write
    steps:  
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nodejs with yarn caching
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn

      - name: Sync package.json versions (dev only)
        if: contains(needs.prepare.outputs.VERSION, '-dev.')
        run: |
          echo "Updating root package.json"
          yarn --cwd . version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version
          
          echo "Updating pkg/suse-ai-lifecycle-manager/package.json"
          yarn --cwd pkg/suse-ai-lifecycle-manager version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version

      - name: Parse Extension Name
        env:
          GH_TOKEN: ${{ github.token }}
        run: |          
          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
          yarn parse-tag-name $TAG ${{ github.run_id }} "catalog"

      - name: Build image
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        run: |
          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
          yarn publish-pkgs -c -i '' -r ghcr.io -o 'leooamaral' -t "$TAG"

      - name: Tag and Push Image
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
        run: |
          skopeo copy --all \
            --change 'LABEL org.opencontainers.image.title=""' \
            --change 'LABEL com.suse.sle.base.lifecycle-url=""' \
            --change 'LABEL com.suse.sle.base.vendor=""' \
            --change 'LABEL com.suse.bci.base.source=""' \
            --change 'LABEL com.suse.sle.base.image-type=""' \
            --change 'LABEL com.suse.image-type=""' \
            --change 'LABEL com.suse.sle.base.url=""' \
            --change 'LABEL com.suse.bci.base.created=""' \
            --change 'LABEL org.opencontainers.image.url=""' \
            --change 'LABEL com.suse.sle.base.eula=""' \
            --change 'LABEL org.opencontainers.image.version=""' \
            --change 'LABEL com.suse.sle.base.created=""' \
            --change 'LABEL com.suse.sle.base.version=""' \
            --change 'LABEL com.suse.bci.base.version=""' \
            --change 'LABEL com.suse.eula=""' \
            --change 'LABEL com.suse.bci.base.reference=""' \
            --change 'LABEL com.suse.sle.base.release-stage=""' \
            --change 'LABEL org.opensuse.reference=""' \
            --change 'LABEL org.opencontainers.image.source=""' \
            --change 'LABEL io.artifacthub.package.readme-url=""' \
            --change 'LABEL com.suse.sle.base.source=""' \
            --change 'LABEL org.opencontainers.image.created=""' \
            --change 'LABEL com.suse.bci.base.eula=""' \
            --change 'LABEL com.suse.bci.base.release-stage=""' \
            --change 'LABEL com.suse.sle.base.description=""' \
            --change 'LABEL com.suse.bci.base.description=""' \
            --change 'LABEL com.suse.sle.base.title=""' \
            --change 'LABEL org.opencontainers.image.description=""' \
            --change 'LABEL com.suse.sle.base.supportlevel=""' \
            --change 'LABEL com.suse.lifecycle-url=""' \
            --change 'LABEL org.openbuildservice.disturl=""' \
            --change 'LABEL com.suse.bci.base.lifecycle-url=""' \
            --change 'LABEL com.suse.bci.base.title=""' \
            --change 'LABEL com.suse.bci.base.disturl=""' \
            --change 'LABEL io.artifacthub.package.logo-url=""' \
            --change 'LABEL com.suse.sle.base.reference=""' \
            --change 'LABEL com.suse.bci.base.image-type=""' \
            --change 'LABEL com.suse.supportlevel=""' \
            --change 'LABEL com.suse.bci.base.vendor=""' \
            --change 'LABEL com.suse.sle.base.disturl=""' \
            --change 'LABEL com.suse.release-stage=""' \
            --change 'LABEL org.opencontainers.image.vendor=""' \
            --change 'LABEL com.suse.sle.base.readme-url=""' \
            --change 'LABEL com.suse.bci.base.url=""' \
            --change 'LABEL com.suse.sle.base.logo-url=""' \
            --change 'LABEL com.suse.bci.base.supportlevel=""' \
            docker://$IMAGE_NAME:$VERSION \
            docker://$IMAGE_NAME:$VERSION-${{ matrix.arch }}
          # docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:$VERSION-${{ matrix.arch }}
          docker push $IMAGE_NAME:$VERSION-${{ matrix.arch }}

  manifest:
    name: Create Container Manifest and Helm Chart
    needs: [prepare, build]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.METADATA_TAGS }}
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.PUBLISH == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
    
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          VERSION: "${{ needs.prepare.outputs.VERSION }}"
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
          
            echo "Creating manifest for tag: $tag"
          
            docker buildx imagetools create \
              -t $IMAGE_NAME:$tag \
              $IMAGE_NAME:$VERSION-amd64 \
              $IMAGE_NAME:$VERSION-arm64
          
          done <<< "${RELEASE_TAG}"

      - name: Update Chart.yaml and values.yaml
        run: |
          yq -i '.version = "${{ needs.prepare.outputs.CHART_VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '.appVersion = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '
            .annotations."helm.sh/images" =
            "- image: ghcr.io/leooamaral/suse-ai-lifecycle-manager:${{ needs.prepare.outputs.VERSION }}\n  name: suse-ai-lifecycle-manager"
          ' $CHART_PATH/Chart.yaml
          yq -i '.image.tag = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/values.yaml

      - name: Sync package.json versions (dev only)
        if: contains(needs.prepare.outputs.VERSION, '-dev.')
        run: |
          echo "Updating root package.json"
          yarn --cwd . version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version
          
          echo "Updating pkg/suse-ai-lifecycle-manager/package.json"
          yarn --cwd pkg/suse-ai-lifecycle-manager version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version

      - name: Package Helm Chart
        id: package
        run: |
          chart_package=$(helm package $CHART_PATH --destination . | awk '{print $NF}')
          echo "chart_package=$chart_package" >> $GITHUB_OUTPUT

      - name: Publish Helm Chart
        run: |
          helm push ${{ steps.package.outputs.chart_package }} \
            $CHART_REGISTRY
            
      - name: Create dev git tag
        if: needs.prepare.outputs.PUBLISH == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
          git checkout -b release/${TAG}

          git add $CHART_PATH/Chart.yaml
          git commit -m "chore(release): ${TAG}"

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create pre-release and release notes for dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START_TAG: ${{ needs.prepare.outputs.NOTES_START_TAG }}
        if: needs.prepare.outputs.PUBLISH == 'true' && github.ref == 'refs/heads/main'
        run: |
          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"

          NOTES_ARG=""
          if [[ -n "$START_TAG" ]]; then
            NOTES_ARG="--notes-start-tag $START_TAG"
          fi

          gh release create "${TAG}" \
            --title "${TAG}" \
            --prerelease --fail-on-no-commits \
            --generate-notes $NOTES_ARG
