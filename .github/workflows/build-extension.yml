name: Build and Publish Extension [Container and Helm Chart - Multi-Arch]

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'charts/suse-ai-operator/**'
      - 'suse-ai-operator/**'
      - '.github/workflows/release-operator.yml'
    tags:
      - suse-ai-lifecycle-manager-*

env:
  CHART_PATH: charts/suse-ai-lifecycle-manager
  CHART_REGISTRY: oci://ghcr.io/leooamaral/chart
  IMAGE_NAME: ghcr.io/leooamaral/suse-ai-lifecycle-manager
  GH_BRANCH: gh-pages
  
jobs:
  prepare:
    outputs:
      VERSION: ${{ steps.tags.outputs.VERSION }}
      CHART_VERSION: ${{ steps.tags.outputs.CHART_VERSION }}
      PUBLISH: ${{ steps.tags.outputs.PUBLISH }}
      METADATA_TAGS: ${{ steps.tags.outputs.METADATA_TAGS }}
      NOTES_START_TAG: ${{ steps.tags.outputs.NOTES_START_TAG }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Calculate tags
        id: tags 
        shell: bash
        run: |
          ref=${{ github.ref }}
          case "$ref" in
            refs/heads/main)
              BASE_VERSION=$(jq -r '.version' pkg/suse-ai-lifecycle-manager/package.json)
              
              git fetch --tags

              LAST_DEV=$(git tag \
                --list "suse-ai-lifecycle-manager-${BASE_VERSION}-dev.*" \
                --sort=-v:refname \
                | head -n 1)

              if [[ -z "$LAST_DEV" ]]; then
                DEV_NUM=1
                NOTES_START_TAG=$(git tag --list "suse-ai-lifecycle-manager-*" --sort=-v:refname | grep -v "\-dev" | head -n 1)
              else
                DEV_NUM="${LAST_DEV##*.}"
                DEV_NUM=$((DEV_NUM + 1))
                NOTES_START_TAG="$LAST_DEV"
              fi

              VERSION="${BASE_VERSION}-dev.${DEV_NUM}"
              CHART_VERSION="$VERSION"
              PUBLISH=true

              METADATA_TAGS="$VERSION"
              ;;
            refs/tags/suse-ai-lifecycle-manager-*)
              VERSION="${ref#refs/tags/suse-ai-lifecycle-manager-}"
              CHART_VERSION="$VERSION"
              NOTES_START_TAG=""
              PUBLISH=true

              if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                METADATA_TAGS="$VERSION"$'\n'"latest"
              else
                METADATA_TAGS="$VERSION"
              fi
              ;;
            *)
              VERSION="${{ github.sha }}"
              CHART_VERSION="$VERSION"
              NOTES_START_TAG=""
              PUBLISH=false

              METADATA_TAGS="$VERSION"
              ;;
          esac

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PUBLISH=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "CHART_VERSION=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "NOTES_START_TAG=$NOTES_START_TAG" >> "$GITHUB_OUTPUT"
          
          echo "METADATA_TAGS<<EOF" >> $GITHUB_OUTPUT
          echo "$METADATA_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-container:
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Build Container Image
    needs: prepare
    if: needs.prepare.outputs.PUBLISH == 'true'
    permissions:
      contents: read
      packages: write
    steps:  
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nodejs with yarn caching
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn

      - name: Sync package.json versions (dev only)
        if: contains(needs.prepare.outputs.VERSION, '-dev.')
        run: |
          echo "Updating root package.json"
          yarn --cwd . version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version
          
          echo "Updating pkg/suse-ai-lifecycle-manager/package.json"
          yarn --cwd pkg/suse-ai-lifecycle-manager version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version

      - name: Parse Extension Name
        env:
          GH_TOKEN: ${{ github.token }}
        run: |          
          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
          yarn parse-tag-name $TAG ${{ github.run_id }} "catalog"

      - name: Build image
        run: |
          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
          yarn publish-pkgs -c -i '' -r ghcr.io -o 'leooamaral' -t "$TAG"

      - name: Tag and Push Image
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
        run: |
          ORIGINAL_IMAGE="$IMAGE_NAME:$VERSION"
          CLEAN_IMAGE="$IMAGE_NAME:$VERSION-${{ matrix.arch }}"
          
          # Create container from the original image
          ctr=$(buildah from docker-daemon:$ORIGINAL_IMAGE)
          
          # Remove all labels
          for lbl in $(buildah inspect $ctr --format '{{range $k, $v := .Config.Labels}}{{$k}}{{"\n"}}{{end}}'); do
            buildah config --label "$lbl=" $ctr
          done
          
          # Commit cleaned image
          buildah commit $ctr $CLEAN_IMAGE
          buildah rm $ctr
          
          # Push the cleaned image
          buildah push $CLEAN_IMAGE docker://$CLEAN_IMAGE

  manifest-container:
    name: Create Container Manifest and Helm Chart
    needs: [prepare, build-container]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.METADATA_TAGS }}
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.PUBLISH == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
    
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          VERSION: "${{ needs.prepare.outputs.VERSION }}"
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
          
            echo "Creating manifest for tag: $tag"
          
            docker buildx imagetools create \
              -t $IMAGE_NAME:$tag \
              $IMAGE_NAME:$VERSION-amd64 \
              $IMAGE_NAME:$VERSION-arm64
          
          done <<< "${RELEASE_TAG}"

      - name: Update Chart.yaml and values.yaml
        run: |
          yq -i '.version = "${{ needs.prepare.outputs.CHART_VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '.appVersion = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '
            .annotations."helm.sh/images" =
            "- image: ghcr.io/leooamaral/suse-ai-lifecycle-manager:${{ needs.prepare.outputs.VERSION }}\n  name: suse-ai-lifecycle-manager"
          ' $CHART_PATH/Chart.yaml
          yq -i '.image.tag = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/values.yaml

      - name: Sync package.json versions (dev only)
        if: contains(needs.prepare.outputs.VERSION, '-dev.')
        run: |
          echo "Updating root package.json"
          yarn --cwd . version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version
          
          echo "Updating pkg/suse-ai-lifecycle-manager/package.json"
          yarn --cwd pkg/suse-ai-lifecycle-manager version --new-version "${{ needs.prepare.outputs.VERSION }}" --no-git-tag-version

      - name: Package Helm Chart
        id: package
        run: |
          chart_package=$(helm package $CHART_PATH --destination . | awk '{print $NF}')
          echo "chart_package=$chart_package" >> $GITHUB_OUTPUT

      - name: Publish Helm Chart
        run: |
          helm push ${{ steps.package.outputs.chart_package }} \
            $CHART_REGISTRY
            
      - name: Create dev git tag
        if: needs.prepare.outputs.PUBLISH == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
          git checkout -b release/${TAG}

          git add $CHART_PATH/Chart.yaml
          git commit -m "chore(release): ${TAG}"

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create pre-release and release notes for dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START_TAG: ${{ needs.prepare.outputs.NOTES_START_TAG }}
        if: needs.prepare.outputs.PUBLISH == 'true' && github.ref == 'refs/heads/main'
        run: |
          TAG="suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"

          NOTES_ARG=""
          if [[ -n "$START_TAG" ]]; then
            NOTES_ARG="--notes-start-tag $START_TAG"
          fi

          gh release create "${TAG}" \
            --title "${TAG}" \
            --prerelease --fail-on-no-commits \
            --generate-notes $NOTES_ARG

  build-gh: 
    name: Build Extension for GH branch
    needs: prepare
    env: 
      RELEASE_TAG: "suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
    runs-on: ubuntu-latest 
    if: needs.prepare.outputs.PUBLISH == 'true' && !contains(needs.prepare.outputs.VERSION, '-dev.')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nodejs with yarn caching
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn

      - name: Parse Extension Name
        env:
          GH_TOKEN: ${{ github.token }}
        run: |          
          yarn parse-tag-name ${{ env.RELEASE_TAG }} ${{ github.run_id }} "charts"

      - name: Build image
        run: |
          yarn publish-pkgs -s ${{ github.repository }} -b "${{ env.GH_BRANCH }}" -t ${{ env.RELEASE_TAG }} -f

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: charts
          path: tmp

  release-gh:
    name: Release Extension for GH branch
    needs: [prepare, build-gh]
    env: 
      RELEASE_TAG: "suse-ai-lifecycle-manager-${{ needs.prepare.outputs.VERSION }}"
    runs-on: ubuntu-latest 
    if: needs.prepare.outputs.PUBLISH == 'true' && !contains(needs.prepare.outputs.VERSION, '-dev.')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.GH_BRANCH }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: charts

      - name: Commit build
        run: |
          git add ./{assets,charts,extensions,index.yaml}
          git commit -a -m "CI Build Artifacts"
          git push

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: ./charts/*
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          CR_SKIP_EXISTING: true
